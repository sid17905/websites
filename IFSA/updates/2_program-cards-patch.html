<!--
  ════════════════════════════════════════════════════════════
  PATCH 2 — PROGRAM CARDS (remove SVG icons, use admin images)
  ════════════════════════════════════════════════════════════
  Replace your current static #programs section with this.
  Cards load their image from the server API.
  If no image is uploaded the card shows a clean placeholder.
  ════════════════════════════════════════════════════════════
-->

<section id="programs" class="py-20 bg-brand-dark">
  <div class="container mx-auto px-6">

    <!-- Section heading — keep your existing markup here -->
    <div class="text-center mb-14 reveal-up">
      <p class="text-xs text-brand-accent uppercase tracking-[0.4em] mb-2 font-bold">| What We Offer</p>
      <h2 class="text-4xl md:text-5xl font-black text-white">Training <span class="text-brand-accent">Tracks</span></h2>
    </div>

    <!-- Grid -->
    <div id="programs-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Cards are injected by JS below -->
    </div>

  </div>
</section>

<script>
(function () {
  'use strict';
  const SERVER_URL = 'http://localhost:3000';

  /* Default program data — matches your existing 3 tracks.
     Admin can override the image for each via admin panel.    */
  const PROGRAMS = [
    {
      id: 'kids-karate',
      track: 'TRACK 01',
      title: 'Kids Karate',
      desc: 'Fun, discipline, and foundational techniques for young learners.',
      href: '#'
    },
    {
      id: 'adult-karate',
      track: 'TRACK 02',
      title: 'Adult Karate',
      desc: 'Master self-defense and technique.',
      href: '#'
    },
    {
      id: 'karate-fitness',
      track: 'TRACK 03',
      title: 'Karate Fitness',
      desc: 'Kata-based conditioning, flexibility & strength.',
      href: '#'
    }
  ];

  async function loadProgramImages() {
    let images = {};
    try {
      const res  = await fetch(`${SERVER_URL}/api/program-images`);
      images = await res.json();   // { 'kids-karate': '/uploads/...', ... }
    } catch (_) {}
    renderCards(images);
  }

  function renderCards(images) {
    const grid = document.getElementById('programs-grid');
    if (!grid) return;
    grid.innerHTML = '';

    PROGRAMS.forEach((p, i) => {
      const imgSrc = images[p.id] || '';
      const card = document.createElement('div');
      card.className = 'stagger-card group relative rounded-2xl overflow-hidden border border-white/10 bg-gray-900 hover:border-brand-accent transition-all duration-300 flex flex-col';
      card.style.transitionDelay = `${i * 80}ms`;

      card.innerHTML = `
        <!-- Image / placeholder area -->
        <div class="relative w-full overflow-hidden" style="aspect-ratio:4/3;background:#111827;">
          ${imgSrc
            ? `<img src="${imgSrc}" alt="${p.title}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" loading="lazy">`
            : `<!-- placeholder shown when no image is uploaded -->
               <div class="w-full h-full flex flex-col items-center justify-center gap-2 select-none" aria-hidden="true">
                 <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(251,191,36,0.25)" stroke-width="1.2" stroke-linecap="round">
                   <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                   <path d="M21 15l-5-5L5 21"/>
                 </svg>
                 <span class="text-xs text-gray-600 font-semibold uppercase tracking-widest">No image uploaded</span>
               </div>`
          }
          <!-- Track label badge -->
          <span class="absolute top-4 left-4 text-xs font-bold tracking-[0.3em] text-brand-accent uppercase">${p.track}</span>
        </div>

        <!-- Card body -->
        <div class="p-6 flex flex-col flex-1">
          <h3 class="text-xl font-black text-white mb-2">${p.title}</h3>
          <p class="text-gray-400 text-sm leading-relaxed flex-1">${p.desc}</p>
          <a href="${p.href}" class="mt-5 inline-flex items-center gap-2 text-brand-accent font-bold text-sm hover:gap-3 transition-all">
            Enroll Now <span>→</span>
          </a>
        </div>
      `;

      grid.appendChild(card);
    });

    /* Trigger stagger-card IntersectionObserver */
    if (typeof IntersectionObserver !== 'undefined') {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.08 });
      grid.querySelectorAll('.stagger-card').forEach(el => obs.observe(el));
    }
  }

  loadProgramImages();
})();
</script>
