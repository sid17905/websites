<script>
// Custom cursor
(function() {
    const cursor = document.getElementById('cursor');
    if (!cursor || window.matchMedia('(pointer: coarse)').matches) {
        if (cursor) cursor.style.display = 'none'; return;
    }
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
    });
})();

// Scroll reveal
(function() {
    const revealEls = document.querySelectorAll('.reveal-up');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }
        });
    }, { threshold: 0.12 });
    revealEls.forEach(el => observer.observe(el));
})();

async function loadUserDocs() {
    try {
        const res = await fetch('http://localhost:3000/api/documents/list');
        const docs = await res.json();
        const grid = document.getElementById('doc-grid');

        if(docs.length === 0) {
            document.getElementById('empty-msg').classList.remove('hidden');
            return;
        }

        grid.innerHTML = docs.map(doc => `
            <div class="reveal-up bg-gray-800 p-6 rounded-xl border border-white/10 shadow-lg hover:border-brand-accent transition group">
                <div class="flex items-start justify-between mb-4">
                    <div class="bg-red-500/20 p-3 rounded-lg">
                        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    </div>
                    <span class="text-xs text-gray-500 bg-gray-900 px-2 py-1 rounded border border-gray-700">${doc.date}</span>
                </div>
                <h3 class="text-xl font-bold text-white mb-2 group-hover:text-brand-accent transition">${doc.title}</h3>
                <p class="text-sm text-gray-400 mb-6">Click to read online.</p>
                <a href="${doc.url}#toolbar=0&navpanes=0&scrollbar=0" target="_blank" class="btn-shimmer block w-full bg-gray-700 hover:bg-brand-accent hover:text-black text-white text-center py-3 rounded-lg font-bold transition">Read Document</a>
            </div>
        `).join('');

        // Re-run reveal observer for dynamically added elements
        document.querySelectorAll('.reveal-up').forEach(el => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }
                });
            }, { threshold: 0.12 });
            observer.observe(el);
        });
    } catch(e) { console.error(e); }
}
loadUserDocs();
</script>

<!-- ═══════════════════════════════════════════════════════════
     PHASE 5 — ANIMATION & INTERACTION UPGRADES (Tasks 5.1 · 5.4 · 5.5)
     ═══════════════════════════════════════════════════════════ -->
<script>
(function () {
    'use strict';

    /* ── 5.4  Scroll Progress Indicator ─────────────────────── */
    var bar = document.getElementById('scroll-progress');
    if (bar) {
        function updateProgress() {
            var scrollTop = window.scrollY || document.documentElement.scrollTop;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            bar.style.width = (docHeight > 0 ? Math.min((scrollTop / docHeight) * 100, 100) : 0) + '%';
        }
        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();
    }

    /* ── 5.1  Page Transition (View Transitions API) ────────── */
    if (document.startViewTransition) {
        var _origin = location.origin;
        document.addEventListener('click', function (e) {
            var el = e.target;
            while (el && el.tagName !== 'A') el = el.parentElement;
            if (!el) return;
            var href = el.getAttribute('href');
            if (!href || el.target === '_blank' || el.hasAttribute('download')) return;
            if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('https://wa.me')) return;
            var url;
            try { url = new URL(href, location.href); } catch (_) { return; }
            if (url.origin !== _origin) return;
            e.preventDefault();
            document.startViewTransition(function () { location.href = url.href; });
        }, true);
    }


    /* ── 5.3  Magnetic Button Effect (desktop only) ─────────── */
    if (!window.matchMedia('(pointer: coarse)').matches) {
        document.querySelectorAll('.magnetic-btn').forEach(function (btn) {
            btn.addEventListener('mousemove', function (e) {
                var rect = btn.getBoundingClientRect();
                var dx = (e.clientX - rect.left - rect.width  / 2) * 0.22;
                var dy = (e.clientY - rect.top  - rect.height / 2) * 0.22;
                btn.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
            });
            btn.addEventListener('mouseleave', function () { btn.style.transform = ''; });
        });
    }

    /* ── 5.5  Ripple Effect on .btn-shimmer ─────────────────── */
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.btn-shimmer');
        if (!btn) return;
        var rect = btn.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.className = 'btn-ripple-el';
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top  = (e.clientY - rect.top) + 'px';
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', function () { ripple.remove(); });
    });
})();
</script>
