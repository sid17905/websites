# ============================================================
#  IFSA — nginx Reverse Proxy + SSL Config  (Task 1.5)
#  
#  Setup steps:
#  1. Install nginx:        sudo apt install nginx
#  2. Install certbot:      sudo apt install certbot python3-certbot-nginx
#  3. Copy this file to:    /etc/nginx/sites-available/ifsa
#  4. Replace YOUR_DOMAIN with your actual domain (e.g. ifsaacademy.in)
#  5. Enable site:          sudo ln -s /etc/nginx/sites-available/ifsa /etc/nginx/sites-enabled/
#  6. Test config:          sudo nginx -t
#  7. Get SSL cert:         sudo certbot --nginx -d YOUR_DOMAIN
#  8. Restart nginx:        sudo systemctl restart nginx
#
#  Certbot auto-renews every 90 days. Verify with:
#  sudo certbot renew --dry-run
# ============================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot will use this for domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL certificates (certbot fills these automatically)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Block direct access to admin from outside (optional — remove if you want remote admin)
    # Uncomment and set your IP to restrict admin access:
    # location /admin.html {
    #     allow YOUR.IP.ADDRESS.HERE;
    #     deny all;
    # }

    # Serve static HTML/CSS/JS files
    root /path/to/your/IFSA/folder;   # ← Change this to your actual project path
    index INDEX.html;

    # Serve static files directly
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API requests to Node.js server
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload size limit (match your multer limit)
        client_max_body_size 50M;
    }

    # Proxy uploaded file serving to Node.js
    location /uploads/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        # Cache uploaded images for 30 days
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
