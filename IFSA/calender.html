<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - IFSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: 'rgb(2, 6, 23)',
                            accent: '#fbbf24',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-dark text-gray-100 font-sans">

    <!-- Navbar -->
    <header class="bg-brand-dark/90 sticky top-0 z-50 backdrop-blur-md border-b border-gray-700/50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-white">IFSA</a>
            <div class="hidden md:flex space-x-6">
                <a href="index.html" class="hover:text-brand-accent">Home</a>
                <a href="gallery.html" class="hover:text-brand-accent">Gallery</a>
                <a href="calender.html" class="text-brand-accent font-bold border-b-2 border-brand-accent">Schedule</a>
                <a href="pricing.html" class="hover:text-brand-accent">Join Now</a>
            </div>
        </nav>
    </header>

    <div class="container mx-auto px-4 py-12 max-w-5xl">
        <h1 class="text-4xl font-bold text-center mb-10 text-white">Annual Calendar</h1>

        <!-- Calendar Controls -->
        <div class="flex justify-between items-center mb-6 bg-gray-800 p-4 rounded-lg border border-gray-700">
            <button onclick="changeMonth(-1)" class="px-4 py-2 bg-gray-700 hover:bg-brand-accent hover:text-black rounded transition">&larr; Prev</button>
            <h2 id="monthYear" class="text-2xl font-bold text-brand-accent">Month Year</h2>
            <button onclick="changeMonth(1)" class="px-4 py-2 bg-gray-700 hover:bg-brand-accent hover:text-black rounded transition">Next &rarr;</button>
        </div>

        <!-- Calendar Grid -->
        <div class="grid grid-cols-7 gap-2 text-center mb-2 font-bold text-gray-400">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-2">
            <!-- Dates generated by JS -->
        </div>

        <!-- Upcoming List -->
        <div class="mt-12 bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-600 pb-2">Upcoming Events List</h3>
            <div id="event-list" class="space-y-3">
                <p class="text-gray-500">Loading events...</p>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let events = [];

        const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

        async function loadEvents() {
            try {
                const res = await fetch('http://localhost:3000/api/schedule/list');
                events = await res.json();
                renderCalendar();
                renderEventList();
            } catch(e) { console.error("Error loading schedule"); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('monthYear');
            
            grid.innerHTML = "";
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthLabel.innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="h-24 bg-gray-900/50 rounded"></div>`;
            }

            // Days
            for (let day = 1; day <= daysInMonth; day++) {
                // Check for events on this day
                const dateString = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => e.date === dateString);

                let eventHTML = dayEvents.map(e => {
                    let color = e.type === 'Exam' ? 'bg-red-600' : e.type === 'Tournament' ? 'bg-amber-500 text-black' : 'bg-blue-600';
                    return `<div class="text-[10px] ${color} text-white rounded px-1 mt-1 truncate">${e.title}</div>`;
                }).join('');

                // Highlight Today
                const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                const bgClass = isToday ? 'bg-gray-700 border-brand-accent border-2' : 'bg-gray-800 hover:bg-gray-700';

                grid.innerHTML += `
                    <div class="${bgClass} h-24 p-2 rounded border border-gray-700 flex flex-col transition">
                        <span class="font-bold text-sm ${isToday ? 'text-brand-accent': 'text-gray-400'}">${day}</span>
                        <div class="overflow-y-auto custom-scrollbar">${eventHTML}</div>
                    </div>
                `;
            }
        }

        function renderEventList() {
            const list = document.getElementById('event-list');
            // Filter only future events
            const futureEvents = events.filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0));
            
            if(futureEvents.length === 0) {
                list.innerHTML = '<p class="text-gray-500">No upcoming events scheduled.</p>';
                return;
            }

            list.innerHTML = futureEvents.map(e => `
                <div class="flex items-center gap-4 bg-gray-700/50 p-3 rounded border-l-4 ${e.type === 'Exam' ? 'border-red-500' : 'border-amber-500'}">
                    <div class="text-center min-w-[60px]">
                        <div class="text-xs text-gray-400 uppercase">${new Date(e.date).toLocaleString('default', {month:'short'})}</div>
                        <div class="text-xl font-bold text-white">${new Date(e.date).getDate()}</div>
                    </div>
                    <div>
                        <div class="font-bold text-white">${e.title}</div>
                        <div class="text-xs text-gray-400 bg-gray-900 inline-block px-2 py-0.5 rounded mt-1">${e.type}</div>
                    </div>
                </div>
            `).join('');
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        loadEvents();
    </script>
</body>
</html>
