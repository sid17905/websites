<script>
let currentDate = new Date();
let events = [];

const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// Custom cursor
(function() {
    const cursor = document.getElementById('cursor');
    if (!cursor || window.matchMedia('(pointer: coarse)').matches) {
        if (cursor) cursor.style.display = 'none'; return;
    }
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
    });
})();

// Scroll reveal
(function() {
    const revealEls = document.querySelectorAll('.reveal-up');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); }
        });
    }, { threshold: 0.12 });
    revealEls.forEach(el => observer.observe(el));
})();

async function loadEvents() {
    try {
        const res = await fetch('/api/schedule/list');
        events = await res.json();
        renderCalendar();
        renderEventList();
    } catch(e) { console.error("Error loading schedule"); }
}

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const monthLabel = document.getElementById('monthYear');
    
    grid.innerHTML = "";
    
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    
    monthLabel.innerText = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="h-24 bg-gray-900/50 rounded"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateString = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(e => e.date === dateString);

        let eventHTML = dayEvents.map(e => {
            let color = e.type === 'Exam' ? 'bg-red-600' : e.type === 'Tournament' ? 'bg-amber-500 text-black' : 'bg-blue-600';
            return `<div class="text-[10px] ${color} text-white rounded px-1 mt-1 truncate">${e.title}</div>`;
        }).join('');

        const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
        const bgClass = isToday ? 'bg-gray-700 border-brand-accent border-2' : 'bg-gray-800 hover:bg-gray-700';

        grid.innerHTML += `
            <div class="${bgClass} h-24 p-2 rounded border border-gray-700 flex flex-col transition">
                <span class="font-bold text-sm ${isToday ? 'text-brand-accent': 'text-gray-400'}">${day}</span>
                <div class="overflow-y-auto custom-scrollbar">${eventHTML}</div>
            </div>
        `;
    }
}

function renderEventList() {
    const list = document.getElementById('event-list');
    const futureEvents = events.filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0));
    
    if(futureEvents.length === 0) {
        list.innerHTML = '<p class="text-gray-500">No upcoming events scheduled.</p>';
        return;
    }

    list.innerHTML = futureEvents.map(e => `
        <div class="flex items-center gap-4 bg-gray-700/50 p-3 rounded border-l-4 ${e.type === 'Exam' ? 'border-red-500' : 'border-amber-500'} hover:bg-gray-700/80 transition">
            <div class="text-center min-w-[60px]">
                <div class="text-xs text-gray-400 uppercase">${new Date(e.date).toLocaleString('default', {month:'short'})}</div>
                <div class="text-xl font-black text-white">${new Date(e.date).getDate()}</div>
            </div>
            <div>
                <div class="font-bold text-white">${e.title}</div>
                <div class="text-xs text-gray-400 bg-gray-900 inline-block px-2 py-0.5 rounded mt-1">${e.type}</div>
            </div>
        </div>
    `).join('');
}

function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
}

loadEvents();
</script>

<script>
(function () {
    'use strict';

    /* ── 5.4  Scroll Progress Indicator ─────────────────────── */
    var bar = document.getElementById('scroll-progress');
    if (bar) {
        function updateProgress() {
            var scrollTop = window.scrollY || document.documentElement.scrollTop;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            bar.style.width = (docHeight > 0 ? Math.min((scrollTop / docHeight) * 100, 100) : 0) + '%';
        }
        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();
    }

    /* ── 5.1  Page Transition (View Transitions API) ────────── */
    if (document.startViewTransition) {
        var _origin = location.origin;
        document.addEventListener('click', function (e) {
            var el = e.target;
            while (el && el.tagName !== 'A') el = el.parentElement;
            if (!el) return;
            var href = el.getAttribute('href');
            if (!href || el.target === '_blank' || el.hasAttribute('download')) return;
            if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('https://wa.me')) return;
            var url;
            try { url = new URL(href, location.href); } catch (_) { return; }
            if (url.origin !== _origin) return;
            e.preventDefault();
            document.startViewTransition(function () { location.href = url.href; });
        }, true);
    }


    /* ── 5.3  Magnetic Button Effect (desktop only) ─────────── */
    if (!window.matchMedia('(pointer: coarse)').matches) {
        document.querySelectorAll('.magnetic-btn').forEach(function (btn) {
            btn.addEventListener('mousemove', function (e) {
                var rect = btn.getBoundingClientRect();
                var dx = (e.clientX - rect.left - rect.width  / 2) * 0.22;
                var dy = (e.clientY - rect.top  - rect.height / 2) * 0.22;
                btn.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
            });
            btn.addEventListener('mouseleave', function () { btn.style.transform = ''; });
        });
    }

    /* ── 5.5  Ripple Effect on .btn-shimmer ─────────────────── */
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.btn-shimmer');
        if (!btn) return;
        var rect = btn.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.className = 'btn-ripple-el';
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top  = (e.clientY - rect.top) + 'px';
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', function () { ripple.remove(); });
    });
})();
</script>
