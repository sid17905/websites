<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline – IFSA Karate Mumbai</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#fbbf24">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        /* Wifi off icon pulse */
        @keyframes wifiPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.95); }
        }
        .wifi-icon { animation: wifiPulse 2s ease-in-out infinite; margin-bottom: 2rem; }

        /* Floating particles */
        @keyframes floatP {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50%       { transform: translateY(-16px); opacity: 0.8; }
        }
        .particle {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 1rem;
        }
        p {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 400px;
            line-height: 1.65;
            margin-bottom: 2.5rem;
        }
        .divider {
            width: 80px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0 auto 1.5rem;
        }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #000;
            font-weight: 900;
            font-size: 0.95rem;
            padding: 0.85rem 2.2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            margin: 0.4rem;
        }
        .btn:hover { background: #d97706; transform: scale(1.04); }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
        .btn-outline:hover { background: var(--accent); color: #000; }

        .cached-notice {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <!-- Decorative particles -->
    <div class="particle" style="left:10%;top:20%;animation:floatP 3.5s ease-in-out infinite 0s;"></div>
    <div class="particle" style="left:85%;top:18%;animation:floatP 3.5s ease-in-out infinite 1.2s;"></div>
    <div class="particle" style="left:20%;top:78%;animation:floatP 3.5s ease-in-out infinite 0.7s;"></div>
    <div class="particle" style="left:78%;top:75%;animation:floatP 3.5s ease-in-out infinite 2s;"></div>

    <!-- Wifi-off SVG -->
    <div class="wifi-icon">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1l22 22" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
            <path d="M16.72 11.06A10.94 10.94 0 0119 12.55" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
            <path d="M5 12.55a10.94 10.94 0 015.17-2.39" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
            <path d="M10.71 5.05A16 16 0 0122.56 9" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
            <path d="M1.42 9a15.91 15.91 0 014.7-2.88" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
            <path d="M8.53 16.11a6 6 0 016.95 0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            <circle cx="12" cy="20" r="1" fill="#fbbf24"/>
        </svg>
    </div>

    <p class="label">| IFSA</p>
    <h1>You're Offline</h1>
    <div class="divider"></div>
    <p>
        It looks like you've lost your internet connection.
        Check your network and try again — we'll be here when you're back on the mat.
    </p>

    <div>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
        <a href="index.html" class="btn btn-outline">Return Home</a>
    </div>

    <p class="cached-notice">
        Some pages may still be available if you visited them before going offline.
    </p>

</body>
</html>
