<script>
// ── Static page cards ────────────────────────────────────────
var PAGES = [
    { label:'Home',      href:'index.html',     icon:'🏠', desc:'Welcome & overview' },
    { label:'About',     href:'about.html',     icon:'👥', desc:'Our story & team' },
    { label:'Gallery',   href:'gallery.html',   icon:'🖼️', desc:'Training photos' },
    { label:'Schedule',  href:'calender.html',  icon:'📅', desc:'Class timetable' },
    { label:'Pricing',   href:'pricing.html',   icon:'💰', desc:'Fees & enrolment' },
    { label:'Documents', href:'documents.html', icon:'📄', desc:'Forms & circulars' },
    { label:'Grading',   href:'grading.html',   icon:'🥋', desc:'Belt grading info' },
    { label:'Payment',   href:'payment.html',   icon:'💳', desc:'Pay fees online' },
];

var container = document.getElementById('static-pages');
PAGES.forEach(function(p) {
    var card = document.createElement('a');
    card.href = p.href;
    card.className = 'group block rounded-xl border border-gray-700/60 p-4 hover:border-yellow-400/60 transition-all duration-200 hover:shadow-[0_0_20px_rgba(251,191,36,0.1)]';
    card.style.background = 'rgba(30,41,59,0.5)';
    card.innerHTML =
        '<div class="flex items-center gap-3 mb-1">' +
        '  <span style="font-size:1.4rem;">' + p.icon + '</span>' +
        '  <span class="font-bold text-white group-hover:text-yellow-400 transition">' + p.label + '</span>' +
        '</div>' +
        '<p class="text-xs text-brand-muted ml-9">' + p.desc + '</p>';
    container.appendChild(card);
});

// ── Live data sections ───────────────────────────────────────
function renderList(containerId, items, fallback) {
    var el = document.getElementById(containerId);
    if (!el) return;
    if (!items || !items.length) {
        el.innerHTML = '<span class="text-gray-600 italic">' + fallback + '</span>';
        return;
    }
    el.innerHTML = items.map(function(t) {
        return '<div class="flex items-center gap-2"><span class="text-yellow-400">·</span><span>' + t + '</span></div>';
    }).join('');
}

// Locations
fetch('/api/locations')
    .then(function(r){ return r.json(); })
    .then(function(d) {
        var names = (d.locations || d || []).map(function(l){ return l.name || l; });
        renderList('live-locations', names, 'No locations found.');
    })
    .catch(function(){ renderList('live-locations', null, 'Could not load locations.'); });

// Documents
fetch('/api/documents/list')
    .then(function(r){ return r.json(); })
    .then(function(d) {
        var docs = (d.documents || d || []).slice(0,5).map(function(doc){ return doc.name || doc.title || doc; });
        renderList('live-documents', docs, 'No documents found.');
    })
    .catch(function(){ renderList('live-documents', null, 'Could not load documents.'); });

// Gallery
fetch('/api/gallery/images')
    .then(function(r){ return r.json(); })
    .then(function(d) {
        var imgs = d.images || d || [];
        // Group by month
        var months = {};
        imgs.forEach(function(img) {
            var m = img.month || img.date || 'Uncategorized';
            months[m] = (months[m] || 0) + 1;
        });
        var lines = Object.keys(months).slice(0,5).map(function(m){
            return m + ' — ' + months[m] + ' photo' + (months[m]>1?'s':'');
        });
        renderList('live-gallery', lines.length ? lines : null, 'No gallery data found.');
    })
    .catch(function(){ renderList('live-gallery', null, 'Could not load gallery data.'); });

// Last updated
document.getElementById('sitemap-updated').textContent =
    'Last updated: ' + new Date().toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });

// Cursor
(function() {
    var cursor = document.getElementById('cursor');
    if (!cursor || window.matchMedia('(pointer: coarse)').matches) {
        if (cursor) cursor.style.display = 'none'; return;
    }
    document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
    });
})();

// Scroll progress
var bar = document.getElementById('scroll-progress');
if (bar) {
    window.addEventListener('scroll', function() {
        var s = window.scrollY, d = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = (d>0 ? Math.min((s/d)*100,100) : 0)+'%';
    }, { passive:true });
}
</script>
